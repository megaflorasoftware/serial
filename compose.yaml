# Comments are provided throughout this file to help you get started.
# If you need more help, visit the Docker Compose reference guide at
# https://docs.docker.com/go/compose-spec-reference/

# Here the instructions define your application as a service called "server".
# This service is built from the Dockerfile in the current directory.
# You can add other services your application may depend on here, such as a
# database or a cache. For examples, see the Awesome Compose repository:
# https://github.com/docker/awesome-compose
services:
  # Local libsql database - exits immediately if DATABASE_URL is set
  libsql:
    image: ghcr.io/tursodatabase/libsql-server:latest
    platform: linux/amd64
    ports:
      - "8080:8080"
    volumes:
      - ./data/libsql:/var/lib/sqld
    environment:
      DATABASE_URL: ${DATABASE_URL:-}
    entrypoint:
      - sh
      - -c
      - |
        [ -z "$DATABASE_URL" ] || exit 0
        exec sqld --http-listen-addr 0.0.0.0:8080
    healthcheck:
      test: ["CMD-SHELL", "[ -n \"$DATABASE_URL\" ] || wget -q -O /dev/null http://localhost:8080/"]
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 2s
  server:
    build:
      context: .
      args:
        DATABASE_URL: ${DATABASE_URL:-http://libsql:8080}
        DATABASE_AUTH_TOKEN: ${DATABASE_AUTH_TOKEN}
        BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:-http://libsql:8080}
      DATABASE_AUTH_TOKEN: ${DATABASE_AUTH_TOKEN}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
      INSTAPAPER_OAUTH_ID: ${INSTAPAPER_OAUTH_ID}
      INSTAPAPER_OAUTH_SECRET: ${INSTAPAPER_OAUTH_SECRET}
    depends_on:
      libsql:
        condition: service_healthy
        required: false
    ports:
      - 3000:3000
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

