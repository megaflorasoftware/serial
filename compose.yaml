services:
  # Local libsql database - exits immediately if DATABASE_URL is set
  libsql:
    image: ghcr.io/tursodatabase/libsql-server:latest
    platform: linux/amd64
    ports:
      - "8085:8080"
    volumes:
      - ./data/libsql:/var/lib/sqld
    environment:
      DATABASE_URL: ${DATABASE_URL:-}
    entrypoint:
      - sh
      - -c
      - |
        [ -z "$DATABASE_URL" ] || exit 0
        exec sqld --http-listen-addr 0.0.0.0:8080
    healthcheck:
      test: ["CMD-SHELL", '[ -n "$DATABASE_URL" ] || kill -0 1']
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 2s
  server:
    build:
      context: .
      args:
        DATABASE_URL: ${DATABASE_URL:-http://libsql:8085}
        DATABASE_AUTH_TOKEN: ${DATABASE_AUTH_TOKEN}
        BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:-http://libsql:8085}
      DATABASE_AUTH_TOKEN: ${DATABASE_AUTH_TOKEN}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
      INSTAPAPER_OAUTH_ID: ${INSTAPAPER_OAUTH_ID}
      INSTAPAPER_OAUTH_SECRET: ${INSTAPAPER_OAUTH_SECRET}
    depends_on:
      libsql:
        condition: service_healthy
        required: false
    ports:
      - 3000:3000
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3000/', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
