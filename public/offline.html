<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <title>Serial</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100dvh;
        background: #0c0a09;
        color: #fafaf9;
      }
      .container {
        text-align: center;
        padding: 2rem;
        max-width: 20rem;
      }
      h1 {
        font-size: 1.25rem;
        font-weight: 600;
        margin-bottom: 0.5rem;
      }
      p {
        color: #a8a29e;
        font-size: 0.875rem;
        line-height: 1.5;
        margin-bottom: 1.5rem;
      }
      button {
        background: #fafaf9;
        color: #0c0a09;
        border: none;
        padding: 0.625rem 1.25rem;
        border-radius: 0.375rem;
        font-size: 0.875rem;
        font-weight: 500;
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
      }
      button:active {
        opacity: 0.8;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>You're offline</h1>
      <p>Serial will reload automatically when your connection returns.</p>
      <button onclick="window.location.reload()">Try again</button>
    </div>
    <script>
      // Reload as soon as connectivity returns.
      window.addEventListener("online", function () {
        window.location.reload();
      });
    </script>
  </body>
</html>
