volumes:
  libsql-data:

services:
  libsql:
    image: ghcr.io/tursodatabase/libsql-server:latest-arm
    volumes:
      - libsql-data:/var/lib/sqld
    command: ["sqld", "--http-listen-addr", "0.0.0.0:8080"]
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1"]
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 2s
    environment:
      SQLD_NODE: primary
  server:
    image: ghcr.io/hfellerhoff/serial:latest
    environment:
      NODE_ENV: production
      DATABASE_URL: http://libsql:8080
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
      INSTAPAPER_OAUTH_ID: ${INSTAPAPER_OAUTH_ID}
      INSTAPAPER_OAUTH_SECRET: ${INSTAPAPER_OAUTH_SECRET}
    depends_on:
      libsql:
        condition: service_healthy
        required: false
    ports:
      - 3000:3000
